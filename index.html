<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerOS — CV Analyzer & Buchhaltung</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">C</div>
      <span class="logo-name">CareerOS</span>
    </div>

    <nav class="sidebar-nav">
      <a href="#/dashboard" class="nav-item" data-route="dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="#/cv" class="nav-item" data-route="cv">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        CV Analyzer
      </a>
      <a href="#/jobs" class="nav-item" data-route="jobs">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Job Tracker
      </a>
      <a href="#/accounting" class="nav-item" data-route="accounting">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Buchhaltung
      </a>
      <a href="#/sales" class="nav-item" data-route="sales">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 17"/><polyline points="17 6 23 6 23 12"/></svg>
        Sales Workflow
      </a>
      <a href="#/events" class="nav-item" data-route="events">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Events
      </a>
    </nav>

    <div class="sidebar-footer">
      <span class="sidebar-version">CareerOS v1.0 · 2026</span>
    </div>

    <!-- Mobile toggle -->
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <div id="view-container"></div>
  </main>

</div>

<!-- Modal overlay -->
<div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true"></div>

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/cv-analyzer.js"></script>
<script src="js/job-tracker.js"></script>
<script src="js/accounting.js"></script>
<script src="js/sales-tracker.js"></script>
<script src="js/script-generator.js"></script>
<script src="js/faq-builder.js"></script>
<script src="js/presentation-gen.js"></script>
<script src="js/event-planner.js"></script>

</body>
</html>
